resolver 127.0.0.11 valid=30s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # `backend` is resolved through a variable so nginx defers DNS lookup to
    # request time (via the resolver above) instead of failing to start when
    # the backend service isn't resolvable yet - e.g. when this image is run
    # standalone, or briefly during a backend container restart.
    location /api/ {
        set $upstream_backend backend:5000;
        proxy_pass http://$upstream_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 130s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
